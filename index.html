<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pitch Invader: World Cup Craze</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="game"></canvas>
<div id="rotatePrompt"><div class="icon">📱</div>请横屏旋转手机以获得最佳体验</div>
<div id="ui">
  <div id="hud">
    <div class="score" id="scoreDisplay">0</div>
    <div class="time" id="timeDisplay">00:00</div>
  </div>
  <div id="stamWrap"><div id="stamBar"></div></div>
  <div id="riotWrap"><div id="riotBar"></div></div>
  <div id="progressWrap"><div id="progressBar"></div></div>
  <div id="commentary"></div>
  <div id="upgradeHUD">体力 Lv0　移速 Lv0<br>翻滚 Lv0　视野 Lv0</div>
  <div id="flash"></div>
  <div id="goldFlash"></div>
  <div id="dangerVignette"></div>

  <div id="joystick"><div id="joystickKnob"></div></div>
  <div id="btnSprint">冲刺</div>
  <div id="btnRoll">翻滚</div>

  <div id="upgradePanel">
    <h2>升级时刻！</h2>
    <div id="upgradeOpts"></div>
  </div>

  <div id="endPanel">
    <h1 id="endTitle">游戏结束</h1>
    <div id="endStats"></div>
    <button id="restartBtn">再次冲场</button>
  </div>

  <div id="startPanel">
    <h1>Pitch Invader: World Cup Craze</h1>
    <p>冲入决赛球场，疯狂和球员合影刷分！球员会源源不断登场，撑到被保安逮捕为止——看你能合影多少人、活多久。
    大牌球星（10号/7号）会逃跑，必须用冲刺/翻滚贴脸抓住强制合影，双倍得分！连续合影攒满狂热值触发【暴动时间】吸引保安。
    键盘：WASD移动，Shift冲刺，Space翻滚。移动端：左摇杆 + 右侧按钮。</p>
    <button id="startBtn">开始冲场</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
